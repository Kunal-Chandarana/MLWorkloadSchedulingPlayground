# Simulated GPU Device Plugin
# This creates a DaemonSet that "advertises" fake GPU resources to nodes
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fake-gpu-plugin
  namespace: kube-system
data:
  fake-gpu.sh: |
    #!/bin/bash
    # Simple script that patches node to advertise GPU resources
    
    NODE_NAME=${NODE_NAME:-$(hostname)}
    GPU_COUNT=${GPU_COUNT:-2}
    
    echo "Advertising $GPU_COUNT GPUs on node $NODE_NAME"
    
    # Patch node to add GPU capacity
    kubectl patch node "$NODE_NAME" -p "{\"status\":{\"capacity\":{\"nvidia.com/gpu\":\"$GPU_COUNT\"},\"allocatable\":{\"nvidia.com/gpu\":\"$GPU_COUNT\"}}}"
    
    # Keep running
    while true; do
      sleep 3600
    done

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fake-gpu-device-plugin
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: fake-gpu-device-plugin
  template:
    metadata:
      labels:
        name: fake-gpu-device-plugin
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: fake-gpu-plugin
      containers:
      - name: fake-gpu-plugin
        image: bitnami/kubectl:latest
        command: ["/bin/bash", "/scripts/fake-gpu.sh"]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: GPU_COUNT
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['gpu-count']
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        securityContext:
          privileged: true
      volumes:
      - name: scripts
        configMap:
          name: fake-gpu-plugin
          defaultMode: 0755
      nodeSelector:
        node-type: gpu-node

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fake-gpu-plugin
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fake-gpu-plugin
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: [""]
  resources: ["nodes/status"]
  verbs: ["patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fake-gpu-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fake-gpu-plugin
subjects:
- kind: ServiceAccount
  name: fake-gpu-plugin
  namespace: kube-system

