# Multiple training jobs to test scheduling policies
---
apiVersion: v1
kind: Pod
metadata:
  name: job-high-priority-1
  labels:
    user: team-a
    priority: high
spec:
  schedulerName: gpu-scheduler
  restartPolicy: Never
  containers:
  - name: training
    image: pytorch-training:latest
    imagePullPolicy: IfNotPresent
    command: ["python", "simple-training.py", "--duration=60", "--job-name=high-priority-1"]
    resources:
      requests:
        nvidia.com/gpu: 1
      limits:
        nvidia.com/gpu: 1

